; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ttgo-t-beam
description = CDP Library Development

[env]
framework = arduino
src_dir = ./src
lib_dir = ./Libraries
lib_extra_dirs = ../
build_flags = 
    -I./src
    -I./src/include
    -I/src/include/boards 
    -I./Libraries/CRC32/src 
    -I./Libraries/RadioLib/src
    -I./Libraries/arduino-timer/src
    -I./Libraries/Crypto
    -I./Libraries/U8g2_Arduino/src
    -I./Libraries/ESPAsyncWebServer/src
    
[env:heltec_wifi_lora_32_V2]
platform = espressif32
board = heltec_wifi_lora_32_V2

[env:cubecell_board]
platform = asrmicro650x
board = cubecell_board

[env:zeroUSB]
platform = atmelsam
board = zeroUSB
upload_protocol = sam-ba

[env:ttgo-t-beam]
platform = espressif32
board = ttgo-t-beam
monitor_speed = 115200
monitor_filters = time
